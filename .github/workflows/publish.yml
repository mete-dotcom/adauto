name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write   # OIDC Trusted Publishing — no API tokens needed

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify dist
        run: |
          ls -lh dist/
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api_token — uses OIDC Trusted Publishing
        # Configure at: https://pypi.org/manage/project/adauto/settings/publishing/
        # Workflow: publish.yml  |  Environment: pypi  |  Tag: v*
